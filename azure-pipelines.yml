trigger:
  branches:
    include:
      - main
      - master
      - develop

pr:
  branches:
    include:
      - "*"

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release

steps:
  - task: UseDotNet@2
    displayName: Use .NET 8 SDK
    inputs:
      packageType: sdk
      version: 8.0.x

  - script: dotnet restore CartService.API.sln
    displayName: Restore dependencies

  - script: dotnet build CartService.API.sln --configuration $(buildConfiguration) --no-restore
    displayName: Build solution

  - script: dotnet test CartService.API.sln --configuration $(buildConfiguration) --no-build
    displayName: Run tests

  - script: dotnet publish CartService.API/CartService.API.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/cartservice --no-build
    displayName: Publish API artifact

  - task: PublishBuildArtifacts@1
    displayName: Publish build artifact
    inputs:
      PathtoPublish: $(Build.ArtifactStagingDirectory)/cartservice
      ArtifactName: cartservice-api
